version: '3.8'

services:
  llm-api-router:
    build: .
    container_name: llm-api-router
    ports:
      - "8000:8000"
    volumes:
      # 持久化数据库（用户信息、路由配置、调用日志）
      - ./data/logs.db:/app/logs.db
      # 挂载配置文件，修改配置不需要重新构建镜像
      - ./config.yaml:/app/config.yaml:ro
    environment:
      # 时区设置，和服务器本地时间一致
      - TZ=Asia/Shanghai
      # 生产环境务必设置 JWT 密钥，长度须 >= 16（勿将含真实密钥的 compose 提交到仓库）
      # - LLM_ROUTER_JWT_SECRET=请替换为 openssl rand -hex 32 的输出
      # Token 有效天数（可选，默认 7）
      # - LLM_ROUTER_ACCESS_TOKEN_EXPIRE_DAYS=30
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
